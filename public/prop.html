<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道具资产 · 天机匣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,165,0,0.1);
    background: rgba(10,10,12,0.95);
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #e8dabc;
  }
  .header-title::before {
    content: "";
    width: 4px; height: 18px;
    border-radius: 2px;
    background: linear-gradient(180deg, #f49169, #f4be79);
  }
  .gen-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    font-size: 14px;
    font-weight: 500;
    color: #1a1410;
    background: linear-gradient(135deg, #f49169, #f4be79);
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .gen-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(244,145,105,0.45);
  }
  .gen-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 40px;
  }

  .placeholder-zone {
    text-align: center;
    padding: 80px 20px;
    color: rgba(232,218,188,0.3);
    font-size: 16px;
  }

  .grid {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    background: rgba(10,10,12,0.95);
    border: 1px solid rgba(255,165,0,0.15);
    border-radius: 14px;
    padding: 24px;
    backdrop-filter: blur(20px);
  }
  .card {
    width: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s, transform 0.5s;
  }
  .card.show {
    opacity: 1;
    transform: translateY(0);
  }
  .card-img {
    width: 140px;
    height: 140px;
    border-radius: 10px;
    border: 1px solid rgba(255,165,0,0.2);
    background: rgba(20,14,8,0.8);
    overflow: hidden;
    object-fit: cover;
  }
  .card-label {
    margin-top: 8px;
    font-size: 13px;
    color: #d1ceb9;
    text-align: center;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(26,20,16,0.3);
    border-top-color: #1a1410;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">道具资产 · 天机匣</div>
  <button class="gen-btn" id="genBtn" onclick="generate()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M5 1L6.2 4.8L10 6L6.2 7.2L5 11L3.8 7.2L0 6L3.8 4.8Z" fill="currentColor"/>
      <path d="M15 2L15.8 4.2L18 5L15.8 5.8L15 8L14.2 5.8L12 5L14.2 4.2Z" fill="currentColor"/>
      <circle cx="18" cy="10" r="2.5" fill="currentColor" opacity="0.25"/>
      <path d="M18 10L6 22" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <span id="btnText">一键生成</span>
  </button>
</div>

<div class="content" id="content">
  <div class="placeholder-zone">点击「一键生成」提取道具资产</div>
</div>

<script>
const PROPS = [
  { src: "/道具/天机匣_道具资产_铜锣_30547.png",     label: "铜锣" },
  { src: "/道具/天机匣_道具资产_钥匙_30548.png",     label: "钥匙" },
  { src: "/道具/天机匣_道具资产_木匣_30549.png",     label: "木匣" },
  { src: "/道具/天机匣_道具资产_木匣(开启发光)_30550.png", label: "木匣(开启发光)" },
  { src: "/道具/天机匣_道具资产_包袱_30551.png",     label: "包袱" },
  { src: "/道具/天机匣_道具资产_荷包_30552.png",     label: "荷包" },
  { src: "/道具/天机匣_道具资产_短剑_30553.png",     label: "短剑" },
  { src: "/道具/天机匣_道具资产_算盘_30554.png",     label: "算盘" },
  { src: "/道具/天机匣_道具资产_透骨钉_30555.png",   label: "透骨钉" },
  { src: "/道具/天机匣_道具资产_货箱_30556.png",     label: "货箱" },
  { src: "/道具/天机匣_道具资产_青铜面具_30557.png", label: "青铜面具" },
];

function generate() {
  const btn = document.getElementById('genBtn');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.textContent = '生成中…';
  btn.insertAdjacentHTML('afterbegin', '<span class="spinner"></span>');

  setTimeout(() => {
    const content = document.getElementById('content');
    content.innerHTML = '';

    const grid = document.createElement('div');
    grid.className = 'grid';
    content.appendChild(grid);

    PROPS.forEach((prop, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<img class="card-img" src="' + prop.src + '" alt="' + prop.label + '" loading="lazy">' +
        '<div class="card-label">' + prop.label + '</div>';
      grid.appendChild(card);
      setTimeout(() => card.classList.add('show'), i * 80);
    });

    btn.disabled = false;
    btnText.textContent = '重新生成';
    const sp = btn.querySelector('.spinner');
    if (sp) sp.remove();
  }, 2500);
}
</script>
</body>
</html>
