<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>场景资产 · 天机匣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,165,0,0.1);
    background: rgba(10,10,12,0.95);
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #e8dabc;
  }
  .header-title::before {
    content: "";
    width: 4px; height: 18px;
    border-radius: 2px;
    background: linear-gradient(180deg, #f49169, #f4be79);
  }
  .gen-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    font-size: 14px;
    font-weight: 500;
    color: #1a1410;
    background: linear-gradient(135deg, #f49169, #f4be79);
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .gen-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(244,145,105,0.45);
  }
  .gen-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 40px;
  }

  .placeholder-zone {
    text-align: center;
    padding: 80px 20px;
    color: rgba(232,218,188,0.3);
    font-size: 16px;
  }

  .scene-group {
    margin-bottom: 28px;
    background: rgba(10,10,12,0.95);
    border: 1px solid rgba(255,165,0,0.15);
    border-radius: 14px;
    padding: 20px;
    backdrop-filter: blur(20px);
  }
  .scene-group-title {
    font-size: 15px;
    font-weight: 600;
    color: #e8dabc;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .scene-group-title::before {
    content: "";
    width: 3px; height: 14px;
    border-radius: 2px;
    background: linear-gradient(180deg, #f49169, #f4be79);
  }

  .grid {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .card {
    width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s, transform 0.5s;
  }
  .card.show {
    opacity: 1;
    transform: translateY(0);
  }
  .card-img {
    width: 200px;
    height: 130px;
    border-radius: 10px;
    border: 1px solid rgba(255,165,0,0.2);
    background: rgba(20,14,8,0.8);
    overflow: hidden;
    object-fit: cover;
  }
  .card-label {
    margin-top: 6px;
    font-size: 12px;
    color: #d1ceb9;
    text-align: center;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(26,20,16,0.3);
    border-top-color: #1a1410;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">场景资产 · 天机匣</div>
  <button class="gen-btn" id="genBtn" onclick="generate()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M5 1L6.2 4.8L10 6L6.2 7.2L5 11L3.8 7.2L0 6L3.8 4.8Z" fill="currentColor"/>
      <path d="M15 2L15.8 4.2L18 5L15.8 5.8L15 8L14.2 5.8L12 5L14.2 4.2Z" fill="currentColor"/>
      <circle cx="18" cy="10" r="2.5" fill="currentColor" opacity="0.25"/>
      <path d="M18 10L6 22" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <span id="btnText">一键生成</span>
  </button>
</div>

<div class="content" id="content">
  <div class="placeholder-zone">点击「一键生成」提取场景资产</div>
</div>

<script>
const SCENES = [
  {
    title: "天机匣幻境 · 金色空间",
    items: [
      { src: "/场景/天机匣_场景资产_天机匣幻境金色空间_外景(全景)_30525.png", label: "全景" },
      { src: "/场景/天机匣_场景资产_天机匣幻境金色空间_外景(云端近距对话区_夜)_30526.png", label: "云端近距对话区" },
      { src: "/场景/天机匣_场景资产_天机匣幻境金色空间_外景(远处山峦剪影方向_夜)_30527.png", label: "远处山峦剪影" },
    ]
  },
  {
    title: "客栈后山 · 竹林小径",
    items: [
      { src: "/场景/天机匣_场景资产_客栈后山竹林小径_外景(全景)_30528.png", label: "全景" },
      { src: "/场景/天机匣_场景资产_客栈后山竹林小径_外景(竹林小径对峙区_夜雨)_30529.png", label: "竹林小径对峙区" },
      { src: "/场景/天机匣_场景资产_客栈后山竹林小径_外景(竹林深处背坡方向_夜雨)_30530.png", label: "竹林深处背坡" },
    ]
  },
  {
    title: "江南古道 · 驿道",
    items: [
      { src: "/场景/天机匣_场景资产_江南古道驿道_外景(全景)_30531.png", label: "全景" },
      { src: "/场景/天机匣_场景资产_江南古道驿道_外景(青石板驿道行走区_黄昏雨)_30532.png", label: "青石板驿道行走区" },
      { src: "/场景/天机匣_场景资产_江南古道驿道_外景(驿道朝古镇方向开阔区_黄昏雨)_30533.png", label: "朝古镇方向开阔区" },
    ]
  },
  {
    title: "顺风客栈 · 大堂",
    items: [
      { src: "/场景/天机匣_场景资产_顺风客栈·大堂_内景(全景)_30534.png", label: "全景" },
      { src: "/场景/天机匣_场景资产_顺风客栈·大堂_内景(中央八仙桌通行区_夜雨)_30535.png", label: "中央八仙桌通行区" },
      { src: "/场景/天机匣_场景资产_顺风客栈·大堂_内景(北侧柜台账台区_夜雨)_30536.png", label: "北侧柜台账台区" },
      { src: "/场景/天机匣_场景资产_顺风客栈·大堂_内景(南侧大门入口区_夜雨)_30537.png", label: "南侧大门入口区" },
    ]
  },
  {
    title: "顺风客栈 · 二楼客房",
    items: [
      { src: "/场景/天机匣_场景资产_顺风客栈·二楼客房_内景(全景)_30538.png", label: "全景" },
      { src: "/场景/天机匣_场景资产_顺风客栈·二楼客房_内景(方桌木匣查看区_夜雨)_30539.png", label: "方桌木匣查看区" },
      { src: "/场景/天机匣_场景资产_顺风客栈·二楼客房_内景(靠窗观察区_夜雨)_30540.png", label: "靠窗观察区" },
    ]
  },
  {
    title: "顺风客栈 · 二楼客房（回防）",
    items: [
      { src: "/场景/天机匣_场景资产_顺风客栈·二楼客房（回防）_内景(全景)_30522.png", label: "全景" },
      { src: "/场景/天机匣_场景资产_顺风客栈·二楼客房（回防）_内景(方桌与油灯区域_夜雨)_30523.png", label: "方桌与油灯区域" },
      { src: "/场景/天机匣_场景资产_顺风客栈·二楼客房（回防）_内景(门口放风区域_夜雨)_30524.png", label: "门口放风区域" },
    ]
  },
  {
    title: "顺风客栈 · 后院",
    items: [
      { src: "/场景/天机匣_场景资产_顺风客栈·后院_外景(全景)_30541.png", label: "全景" },
      { src: "/场景/天机匣_场景资产_顺风客栈·后院_外景(院中柴房门前区_夜雨)_30542.png", label: "院中柴房门前区" },
      { src: "/场景/天机匣_场景资产_顺风客栈·后院_外景(磨盘掩蔽区_夜雨)_30543.png", label: "磨盘掩蔽区" },
    ]
  },
  {
    title: "顺风客栈 · 后院连大堂走廊",
    items: [
      { src: "/场景/天机匣_场景资产_顺风客栈·后院连大堂走廊_外景(全景)_30544.png", label: "全景" },
      { src: "/场景/天机匣_场景资产_顺风客栈·后院连大堂走廊_外景(走廊中段通行区_夜雨)_30545.png", label: "走廊中段通行区" },
      { src: "/场景/天机匣_场景资产_顺风客栈·后院连大堂走廊_外景(靠大堂门洞侧_夜雨)_30546.png", label: "靠大堂门洞侧" },
    ]
  },
];

function generate() {
  const btn = document.getElementById('genBtn');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.textContent = '生成中…';
  btn.querySelector('.spinner') || btn.insertAdjacentHTML('afterbegin', '<span class="spinner"></span>');

  setTimeout(() => {
    const content = document.getElementById('content');
    content.innerHTML = '';

    SCENES.forEach((scene, si) => {
      const group = document.createElement('div');
      group.className = 'scene-group';

      const title = document.createElement('div');
      title.className = 'scene-group-title';
      title.textContent = scene.title;
      group.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'grid';
      group.appendChild(grid);

      content.appendChild(group);

      scene.items.forEach((item, ii) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML =
          '<img class="card-img" src="' + item.src + '" alt="' + item.label + '" loading="lazy">' +
          '<div class="card-label">' + item.label + '</div>';
        grid.appendChild(card);

        setTimeout(() => card.classList.add('show'), (si * 3 + ii) * 80);
      });
    });

    btn.disabled = false;
    btnText.textContent = '重新生成';
    const sp = btn.querySelector('.spinner');
    if (sp) sp.remove();
  }, 2500);
}
</script>
</body>
</html>
